<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="880" viewBox="0 0 1320 880" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#555"/>
    </marker>
    <marker id="ahr" markerWidth="10" markerHeight="10" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#C44E52"/>
    </marker>
  </defs>
  <rect width="1320" height="880" fill="#ffffff"/>

  <text x="60" y="46" font-size="23" fill="#222" font-weight="bold">STM32F103 FreeRTOS Sensor Node — Architecture</text>

  <!-- ============ Panel a : data path ============ -->
  <text x="60" y="92" font-size="17" fill="#333" font-weight="bold">a</text>
  <text x="80" y="92" font-size="15" fill="#777">Data path</text>

  <!-- sensors / peripherals (green) -->
  <rect x="58" y="150" width="124" height="46" rx="7" fill="#EAF4EC" stroke="#55A868" stroke-width="1.6"/>
  <text x="120" y="178" text-anchor="middle" font-size="15" fill="#333">DHT11</text>
  <rect x="58" y="224" width="124" height="46" rx="7" fill="#EAF4EC" stroke="#55A868" stroke-width="1.6"/>
  <text x="120" y="252" text-anchor="middle" font-size="15" fill="#333">BH1750</text>
  <rect x="52" y="298" width="160" height="58" rx="7" fill="#EAF4EC" stroke="#55A868" stroke-width="1.6"/>
  <text x="132" y="322" text-anchor="middle" font-size="14.5" fill="#333"><tspan x="132" dy="0">USART1 RX</tspan><tspan x="132" dy="17">DMA + idle IRQ</tspan></text>

  <!-- stream buffer (gold pill) -->
  <rect x="268" y="305" width="138" height="44" rx="22" fill="#FAF4E0" stroke="#B8973A" stroke-width="1.6"/>
  <text x="337" y="332" text-anchor="middle" font-size="14.5" fill="#333">Stream Buffer</text>

  <!-- tasks (blue) -->
  <rect x="470" y="163" width="222" height="62" rx="7" fill="#EAF0F8" stroke="#4C72B0" stroke-width="1.6"/>
  <text x="581" y="189" text-anchor="middle" font-size="14.5" fill="#333"><tspan x="581" dy="0">vSampleReportTask · P1</tspan><tspan x="581" dy="17">sample / heartbeat</tspan></text>
  <rect x="470" y="300" width="200" height="62" rx="7" fill="#EAF0F8" stroke="#4C72B0" stroke-width="1.6"/>
  <text x="570" y="326" text-anchor="middle" font-size="14.5" fill="#333"><tspan x="570" dy="0">vCmdTask · P3</tspan><tspan x="570" dy="17">parse commands</tspan></text>

  <!-- xTxQueue (gold pill) -->
  <rect x="748" y="232" width="124" height="44" rx="22" fill="#FAF4E0" stroke="#B8973A" stroke-width="1.6"/>
  <text x="810" y="259" text-anchor="middle" font-size="14.5" fill="#333">xTxQueue</text>

  <rect x="952" y="227" width="158" height="62" rx="7" fill="#EAF0F8" stroke="#4C72B0" stroke-width="1.6"/>
  <text x="1031" y="253" text-anchor="middle" font-size="14.5" fill="#333"><tspan x="1031" dy="0">vTxTask · P2</tspan><tspan x="1031" dy="17">serial send</tspan></text>

  <rect x="1168" y="230" width="140" height="56" rx="7" fill="#EAF4EC" stroke="#55A868" stroke-width="1.6"/>
  <text x="1238" y="253" text-anchor="middle" font-size="14.5" fill="#333"><tspan x="1238" dy="0">USART1 TX</tspan><tspan x="1238" dy="17">115200 8N1</tspan></text>

  <!-- arrows panel a -->
  <line x1="182" y1="173" x2="466" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="182" y1="247" x2="466" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="212" y1="328" x2="264" y2="328" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="406" y1="328" x2="466" y2="330" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="670" y1="320" x2="746" y2="262" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="692" y1="206" x2="746" y2="246" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="872" y1="254" x2="948" y2="256" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="1110" y1="257" x2="1164" y2="257" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- legend (top-right of panel a) -->
  <g font-size="13" fill="#555">
    <rect x="1044" y="96" width="14" height="14" rx="3" fill="#EAF0F8" stroke="#4C72B0" stroke-width="1.4"/>
    <text x="1064" y="107">FreeRTOS task</text>
    <rect x="1044" y="118" width="14" height="14" rx="3" fill="#EAF4EC" stroke="#55A868" stroke-width="1.4"/>
    <text x="1064" y="129">peripheral / sensor</text>
    <rect x="1044" y="140" width="14" height="14" rx="3" fill="#FAF4E0" stroke="#B8973A" stroke-width="1.4"/>
    <text x="1064" y="151">kernel IPC object</text>
    <rect x="1044" y="162" width="14" height="14" rx="3" fill="#F9EAEB" stroke="#C44E52" stroke-width="1.4"/>
    <text x="1064" y="173">watchdog</text>
    <line x1="1044" y1="190" x2="1074" y2="190" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
    <text x="1080" y="194">data flow</text>
    <line x1="1158" y1="190" x2="1188" y2="190" stroke="#C44E52" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#ahr)"/>
    <text x="1194" y="194">reset</text>
  </g>

  <!-- ============ Panel b : watchdog ============ -->
  <rect x="44" y="470" width="1232" height="356" rx="12" fill="#FBFBFC" stroke="#E2E2E2" stroke-width="1.4"/>
  <text x="66" y="506" font-size="17" fill="#333" font-weight="bold">b</text>
  <text x="86" y="506" font-size="15" fill="#777">All-hands watchdog — feed only when all three tasks have checked in</text>

  <rect x="120" y="560" width="180" height="48" rx="7" fill="#EAF0F8" stroke="#4C72B0" stroke-width="1.6"/>
  <text x="210" y="589" text-anchor="middle" font-size="14.5" fill="#333">vCmdTask</text>
  <rect x="120" y="636" width="180" height="48" rx="7" fill="#EAF0F8" stroke="#4C72B0" stroke-width="1.6"/>
  <text x="210" y="665" text-anchor="middle" font-size="14.5" fill="#333">vSampleReportTask</text>
  <rect x="120" y="712" width="180" height="48" rx="7" fill="#EAF0F8" stroke="#4C72B0" stroke-width="1.6"/>
  <text x="210" y="741" text-anchor="middle" font-size="14.5" fill="#333">vTxTask</text>

  <rect x="500" y="630" width="170" height="62" rx="31" fill="#FAF4E0" stroke="#B8973A" stroke-width="1.6"/>
  <text x="585" y="656" text-anchor="middle" font-size="14.5" fill="#333"><tspan x="585" dy="0">Event Group</tspan><tspan x="585" dy="17">check-in bits</tspan></text>

  <rect x="800" y="628" width="240" height="66" rx="7" fill="#F9EAEB" stroke="#C44E52" stroke-width="1.6"/>
  <text x="920" y="655" text-anchor="middle" font-size="14.5" fill="#333"><tspan x="920" dy="0">IWDG · 2 s</tspan><tspan x="920" dy="17">refresh iff all three set</tspan></text>

  <line x1="300" y1="584" x2="496" y2="648" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="300" y1="660" x2="496" y2="662" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="300" y1="736" x2="496" y2="676" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="670" y1="661" x2="796" y2="661" stroke="#555" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="735" y="650" text-anchor="middle" font-size="13" fill="#777">all set</text>

  <!-- dashed reset feedback along the bottom -->
  <path d="M 920,694 L 920,792 L 210,792 L 210,762" fill="none" stroke="#C44E52" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ahr)"/>
  <text x="565" y="785" text-anchor="middle" font-size="13.5" fill="#C44E52">any task misses → MCU reset</text>
</svg>
